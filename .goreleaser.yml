# .goreleaser.yml
version: 2

release:
  github:
    owner: jauderho
    name: bl3auto

snapshot:
  version_template: SNAPSHOT-{{ .Commit }}
  
#gomod:
#  proxy: true

before:
  hooks:
    - go mod tidy
    
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
      - freebsd
      - aix
    goarch:
      - 386
      - amd64
      - arm
      - arm64
      - s390x
      - ppc64le
      - ppc64
      - riscv64
    goarm:
      - 6
      - 7
    goamd64:
      - v1
    ignore:
      - goos: linux
        goarch: ppc64
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: ppc64le
      - goos: darwin
        goarch: s390x
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: ppc64le
      - goos: windows
        goarch: s390x
      - goos: freebsd
        goarch: arm
      #- goos: freebsd
      #  goarch: arm64
      - goos: freebsd
        goarch: ppc64le
      - goos: freebsd
        goarch: s390x
    dir: .
    main: ./cmd/bl3auto.go
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - -s -w 

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    #replacements:
    #  darwin: macos
    # .ConventionalFileName was removed in goreleaser v2; use the v2 default pattern.
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
    files:
      - LICENSE
      - README.md

homebrew_casks:
  - repository:
      owner: jauderho
      name: homebrew-bl3auto
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: Jauder Ho
      email: jauderho@users.noreply.github.com
    homepage: "https://github.com/jauderho/bl3auto/"
    description: "Borderlands and Wonderlands Bulk SHiFT Code Redemption System"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/bl3auto"]
          end

nfpms:
  -
    id: bl3auto-nfpms
    package_name: bl3auto
    file_name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
    homepage: "https://github.com/jauderho/bl3auto"
    maintainer: "Jauder Ho <jauderho@users.noreply.github.com>"
    description: "Borderlands and Wonderlands Bulk SHiFT Code Redemption System"
    license: Apache-2.0
    formats:
      - deb
      - rpm

changelog:
  sort: asc
  filters:
    exclude:
    - '^docs:'
    - '^test:'
    - '^dev:'
    - '^gha:'
    - 'README'
    - 'build\(deps\): bump .* in /docs \(#\d+\)'
    - Merge pull request
    - Merge branch

checksum:
  algorithm: sha256
  name_template: '{{ .ProjectName }}-{{ .Version }}-checksums.txt'

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

source:
  enabled: true

signs:
  - cmd: cosign
    signature: "${artifact}.bundle"
    args: ["sign-blob", "--bundle=${signature}", "${artifact}", "--yes"]
    artifacts: all
